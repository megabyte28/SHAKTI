<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project212</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500&family=Inter:wght@300;400&display=swap">
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css">
    <link rel="icon" type="image/png" href="shakti-logo.png">
</head>

<body>
    <div id="app-container">
        <div id="map"></div>
        <div id="ui">
            <div class="header-container">
                <div class="logo-icon">
                    <img src="shakti-logo.png" alt="Shakti Logo" class="brand-logo">
                </div>
                <div class="title-text">
                    <h1>SHAKTI: <span>Safe Route Finder</span></h1>
                </div>
                <div class="search-box">
                    <input type="text" placeholder="From:" id="from-input">
                    <input type="text" placeholder="To:" id="to-input">
                </div>
                <div id="suggestion-box">
                    <ul id="suggestions">
                    </ul>
                </div>
                <button id="nav-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/pmtiles@2.11.0/dist/index.js"></script>
    <script src="script.js"></script>
</body>

</html>
